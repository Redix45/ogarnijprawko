<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("op_theme")||"light")</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kategoria ‚ÄĒ ogarnijprawko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header"><div class="container bar">
  <a class="brand" href="index.html"><span class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.4" fill="#fff" stroke="none"/><path d="M12 14.4V21M9.7 11.2 4.2 8.2M14.3 11.2 19.8 8.2"/></svg></span> ogarnijprawko</a>
  <nav class="nav">
    <a href="index.html">Start</a>
    <a href="kategoria.html" id="navKat" class="active">Kategorie</a>
    <a href="cennik.html">Cennik</a>
  </nav>
</div></header>

<main class="container" id="app"><div class="spinner"></div></main>

<footer class="footer container">
  Pytania z oficjalnej bazy Ministerstwa Infrastruktury (gov.pl) ‚ÄĒ domena publiczna.<br>
  ogarnijprawko ¬∑ projekt edukacyjny ¬∑ nie jest powińÖzany z WORD ani MI.
</footer>

<script src="app.js"></script>
<script>
const KAT = PT.qs("kat") || localStorage.getItem("pt_kat") || "B";
localStorage.setItem("pt_kat", KAT);

function demoBanner(){
  if(PT.isPaid()) return "";
  const exam = PT.demoExamUsed() ? "egzamin pr√≥bny wykorzystany" : "1 darmowy egzamin pr√≥bny";
  return `<div class="demo-banner">
    <span><b>Wersja demo.</b> Darmowo: ${PT.ACCESS.naukaLimit} pytaŇĄ nauki + ${exam}.</span>
    <a class="btn" href="cennik.html">Odblokuj wszystko ‚ÄĒ ${PT.ACCESS.cena} zŇā ‚Üí</a>
  </div>`;
}

function trybCard(emoji, tytul, opis, href, locked, primary){
  return `<a class="mode-card tryb ${locked?'locked':''}" href="${locked?'cennik.html?powod='+encodeURIComponent(tytul):href}">
    ${locked?'<span class="lock">ūüĒí</span>':''}
    <h3>${emoji?emoji+" ":""}${tytul}</h3>
    <p>${opis}</p>
    <span class="btn ${primary?'':'ghost'}">${locked?'Odblokuj':'Wybierz'} ‚Üí</span>
  </a>`;
}

function render(idx){
  const meta = idx.kategorie[KAT];
  const m = PT.CAT_META[KAT] || {n:KAT};
  if(!meta){ document.getElementById("app").innerHTML='<p class="muted">Brak kategorii.</p>'; return; }

  const dzialy = (meta.dzialy||[]).map(d=>{
    const href = `nauka.html?kat=${KAT}&dzial=${d.slug}`;
    return `<a class="cat dzial" href="${href}">
      <div class="code-sm">${d.nazwa}</div>
      <div class="count">${d.liczba} pytaŇĄ</div>
    </a>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <section class="hero" style="padding:48px 0 12px">
      <div class="kicker"><span class="dot"></span> Kategoria ${KAT}</div>
      <h1>${m.n}</h1>
      <p>${meta.razem} pytaŇĄ ¬∑ ${meta.podstawowe} podstawowych + ${meta.specjalistyczne} specjalistycznych</p>
    </section>
    ${demoBanner()}

    <section class="section" style="margin-top:34px">
      <h2>Tryby nauki</h2>
      <div class="modes" style="margin-top:18px">
        ${trybCard("","Nauka",`Wszystkie ${meta.razem} pytaŇĄ bez limitu czasu, z natychmiastowym feedbackiem.${PT.isPaid()?'':' Demo: '+PT.ACCESS.naukaLimit+' pytaŇĄ.'}`, `nauka.html?kat=${KAT}`, false, true)}
        ${trybCard("","Symulator","32 pytania, czas i punktacja jak na egzaminie. Ciemny, wygodny interfejs.", `egzamin.html?kat=${KAT}`, !PT.canExam(), false)}
        ${trybCard("","Egzamin paŇĄstwowy 1:1","Wierna kopia interfejsu WORD. Tak wyglńÖda prawdziwy egzamin.", `egzamin-word.html?kat=${KAT}`, !PT.canExam(), false)}
      </div>
    </section>

    <section class="section">
      <h2>DziaŇāy tematyczne</h2>
      <p class="muted" style="margin-top:-4px">Ucz sińô partiami. <span style="opacity:.7">PodziaŇā tematyczny generowany automatycznie.</span></p>
      <div class="cat-grid" style="margin-top:18px">${dzialy}</div>
    </section>`;
}

PT.loadIndex().then(render).catch(e=>{
  document.getElementById("app").innerHTML='<p class="muted">BŇāńÖd Ňāadowania.</p>'; console.error(e);
});
</script>
</body>
</html>
